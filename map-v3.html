<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地图数据管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            font-size: 13px;
            color: #1f2329;
            overflow: hidden;
            background: #f5f6f7;
        }
        
        .app { display: flex; height: 100vh; }
        
        /* 左侧边栏 */
        .sidebar {
            width: 360px;
            background: #fff;
            border-right: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
            position: relative;
        }
        
        .sidebar.collapsed {
            width: 40px;
        }
        
        .sidebar.collapsed .sidebar-content {
            display: none;
        }
        
        .sidebar-toggle {
            position: absolute;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 60px;
            background: #1677ff;
            color: #fff;
            border: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            z-index: 100;
        }
        
        .sidebar.collapsed .sidebar-toggle {
            right: -20px;
        }
        
        .sidebar-header {
            padding: 16px;
            background: linear-gradient(135deg, #1677ff 0%, #0958d9 100%);
            color: white;
        }
        
        .sidebar-header h1 { font-size: 16px; font-weight: 600; }
        .sidebar-header p { font-size: 12px; opacity: 0.85; margin-top: 4px; }
        
        .sidebar-header-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        
        .sidebar-header-btn {
            padding: 4px 10px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 4px;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        
        .sidebar-header-btn:hover {
            background: rgba(255,255,255,0.25);
            border-color: rgba(255,255,255,0.6);
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid #e8e8e8;
            background: #fafafa;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .tab:hover { background: #f0f0f0; }
        .tab.active {
            color: #1677ff;
            border-bottom-color: #1677ff;
            background: #fff;
        }
        
        .tab-content {
            flex: 1;
            overflow-y: auto;
            display: none;
            padding: 12px;
        }
        
        .tab-content.active { display: block; }
        
        /* 面板 */
        .panel {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e8e8e8;
            margin-bottom: 12px;
            overflow: hidden;
        }
        
        .panel-header {
            padding: 12px 16px;
            background: #fafafa;
            border-bottom: 1px solid #e8e8e8;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .panel-body { padding: 16px; }
        
        /* 按钮 */
        .btn {
            padding: 6px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .btn:hover { border-color: #1677ff; color: #1677ff; }
        .btn-primary { background: #1677ff; border-color: #1677ff; color: #fff; }
        .btn-primary:hover { background: #0958d9; }
        .btn-danger { background: #ff4d4f; border-color: #ff4d4f; color: #fff; }
        .btn-sm { padding: 4px 8px; font-size: 12px; }
        .btn.active { background: #1677ff; border-color: #1677ff; color: #fff; }
        
        /* 图层列表 */
        .layer-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .layer-item:hover { background: #f6ffed; }
        .layer-item:hover .layer-delete { opacity: 1; }
        .layer-item.active { background: #e6f7ff; border-left: 3px solid #1677ff; }
        
        .layer-visibility {
            width: 20px;
            margin-right: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .layer-symbol {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }
        
        .layer-info { flex: 1; }
        .layer-name { font-weight: 500; font-size: 13px; }
        .layer-meta { font-size: 11px; color: #8c8c8c; margin-top: 2px; }
        .layer-delete {
            opacity: 0;
            color: #ff4d4f;
            font-size: 12px;
            cursor: pointer;
            padding: 4px;
            transition: opacity 0.2s;
        }
        
        /* 表单 */
        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
            color: #595959;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 13px;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #1677ff;
        }
        
        .form-row { display: flex; gap: 8px; }
        .form-row .form-group { flex: 1; }
        
        /* 表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        
        .data-table th,
        .data-table td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .data-table th {
            background: #fafafa;
            font-weight: 600;
            color: #595959;
        }
        
        .data-table tr:hover { background: #f6ffed; cursor: pointer; }
        .data-table tr.selected { background: #e6f7ff; }
        
        .data-table th:first-child,
        .data-table td:first-child {
            width: 40px;
            text-align: center;
        }
        
        .data-table input[type="checkbox"] {
            cursor: pointer;
        }
        
        /* 地图 */
        .map-container {
            flex: 1;
            position: relative;
            background: #f0f2f5;
        }
        
        #map { width: 100%; height: 100%; }
        
        /* 工具栏 */
        .toolbar {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }
        
        .toolbar-group {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 6px;
            display: flex;
            gap: 4px;
        }
        
        /* 图例 */
        .legend {
            position: absolute;
            bottom: 80px;
            right: 16px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 12px;
            min-width: 140px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .legend-title { font-weight: 600; margin-bottom: 8px; font-size: 13px; }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            font-size: 12px;
        }
        
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        /* 底图切换 */
        .basemap-bar {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 4px;
            display: flex;
            gap: 4px;
        }
        
        .basemap-item {
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .basemap-item:hover { background: #f0f0f0; }
        .basemap-item.active { background: #1677ff; color: #fff; }
        
        /* 底图要素控制 */
        .map-features-bar {
            position: absolute;
            bottom: 56px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 4px 8px;
            display: flex;
            gap: 12px;
            font-size: 12px;
        }
        
        .map-feature-item {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            user-select: none;
        }
        
        .map-feature-item input[type="checkbox"] {
            cursor: pointer;
        }
        
        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .modal-overlay.show { display: flex; }
        
        .modal {
            background: #fff;
            border-radius: 12px;
            width: 420px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e8e8e8;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-body { padding: 20px; }
        .modal-footer {
            padding: 12px 20px;
            border-top: 1px solid #e8e8e8;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        
        /* 字段列表 */
        .field-list { margin-bottom: 12px; }
        .field-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            padding: 8px;
            background: #fafafa;
            border-radius: 4px;
        }
        
        .field-item input { flex: 1; }
        .field-item select { width: 100px; }
        
        /* 图标选择器 */
        .icon-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        
        .icon-option {
            width: 40px;
            height: 40px;
            border: 2px solid #d9d9d9;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #fff;
        }
        
        .icon-option:hover { border-color: #1677ff; }
        .icon-option.active {
            border-color: #1677ff;
            background: #e6f7ff;
        }
        
        /* 筛选器 */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            padding: 8px;
            background: #fafafa;
            border-radius: 6px;
        }
        
        .filter-bar select,
        .filter-bar input { flex: 1; }
        
        /* 加载 */
        .loading {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f0f0f0;
            border-top: 3px solid #1677ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8c8c8c;
        }
        
        .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
        
        /* 图片上传 */
        .upload-area {
            border: 2px dashed #d9d9d9;
            border-radius: 6px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .upload-area:hover {
            border-color: #1677ff;
            background: #f5f5f5;
        }
        
        .upload-area input { display: none; }
        
        .image-preview {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        
        .image-preview img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
        }
        
        /* 下钻弹窗 - 表格形式 */
        .drill-modal {
            width: 500px;
            max-width: 95%;
        }
        
        .drill-image-container {
            width: 100%;
            height: 200px;
            background: #f5f5f5;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            overflow: hidden;
        }
        
        .drill-image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .drill-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .drill-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .drill-table td:first-child {
            width: 100px;
            color: #8c8c8c;
            font-weight: 500;
            background: #fafafa;
        }
        
        /* 颜色映射 */
        .color-map-list {
            margin-top: 12px;
        }
        
        /* 可折叠面板 */
        .collapsible-panel {
            margin-bottom: 12px;
        }
        
        .collapsible-header {
            padding: 12px 16px;
            background: #fafafa;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .collapsible-header:hover {
            background: #f0f0f0;
        }
        
        .collapsible-header .arrow {
            transition: transform 0.3s;
            font-size: 12px;
        }
        
        .collapsible-header.collapsed .arrow {
            transform: rotate(-90deg);
        }
        
        .collapsible-content {
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            max-height: 2000px;
        }
        
        .collapsible-content.collapsed {
            max-height: 0;
        }
        
        .collapsible-content .panel-body {
            padding-top: 16px;
        }
        
        .color-map-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            padding: 8px;
            background: #fafafa;
            border-radius: 4px;
        }
        
        .color-map-item input[type="text"] {
            flex: 1;
        }
        
        .color-map-item input[type="color"] {
            width: 40px;
            height: 28px;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 左侧边栏 -->
        <div class="sidebar" id="sidebar">
            <button class="sidebar-toggle" onclick="toggleSidebar()" title="折叠/展开">◀</button>
            <div class="sidebar-content">
            <div class="sidebar-header">
                <h1>🗺️ 地图数据管理</h1>
                <p>地理信息数据可视化平台</p>
            </div>
            
            <div class="tabs">
                <div class="tab active" onclick="switchTab('layers')">📁 图层</div>
                <div class="tab" onclick="switchTab('data')">📊 数据</div>
                <div class="tab" onclick="switchTab('style')">🎨 样式</div>
            </div>
            
            <!-- 图层面板 -->
            <div class="tab-content active" id="tab-layers">
                <div class="panel">
                    <div class="panel-header">
                        <span>图层列表</span>
                        <button class="btn btn-primary btn-sm" onclick="showCreateLayerModal()">+ 新建</button>
                    </div>
                    <div id="layerList" style="max-height: 300px; overflow-y: auto;">
                        <div class="empty-state">
                            <div class="empty-state-icon">📂</div>
                            <div>暂无图层，点击新建</div>
                        </div>
                    </div>
                </div>
                
                <div class="panel">
                    <div class="panel-header">📈 图例</div>
                    <div class="panel-body">
                        <div id="legendContent">
                            <div style="color: #8c8c8c; font-size: 12px;">暂无数据</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 数据面板 -->
            <div class="tab-content" id="tab-data">
                <div class="panel">
                    <div class="panel-header">
                        <span>数据筛选</span>
                    </div>
                    <div class="panel-body">
                        <div class="filter-bar">
                            <select id="filterField" onchange="applyFilter()">
                                <option value="">选择字段</option>
                            </select>
                            <input type="text" id="filterValue" placeholder="筛选值" oninput="applyFilter()">
                            <button class="btn btn-sm" onclick="clearFilter()">清除</button>
                        </div>
                    </div>
                </div>
                
                <div class="panel">
                    <div class="panel-header">
                        <span>数据记录</span>
                        <div>
                            <button class="btn btn-danger btn-sm" onclick="batchDelete()" id="batchDeleteBtn" style="display: none;">批量删除</button>
                            <span id="recordCount" style="font-size: 11px; color: #8c8c8c; margin-left: 8px;">0 条</span>
                        </div>
                    </div>
                    <div style="overflow-x: auto; max-height: 400px;">
                        <table class="data-table" id="dataTable">
                            <thead></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <!-- 样式面板 -->
            <div class="tab-content" id="tab-style">
                <!-- 底图设置 -->
                <!-- 数据管理 -->
                <div class="collapsible-panel">
                    <div class="collapsible-header" onclick="toggleCollapse(this)">
                        <span>💾 数据管理</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="collapsible-content">
                        <div class="panel-body">
                            <div class="form-group">
                                <label>数据迁移</label>
                                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                                    <button class="btn btn-sm" onclick="exportData()">📤 导出数据</button>
                                    <button class="btn btn-sm" onclick="document.getElementById('importFile').click()">📥 导入数据</button>
                                    <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(this)">
                                </div>
                                <div style="font-size: 11px; color: #8c8c8c; margin-top: 8px;">
                                    导出数据文件可在其他电脑导入使用
                                </div>
                            </div>
                            <div class="form-group" style="margin-top: 12px;">
                                <button class="btn btn-danger btn-sm" onclick="clearAllData()">🗑️ 清空所有数据</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="collapsible-panel">
                    <div class="collapsible-header" onclick="toggleCollapse(this)">
                        <span>🗺️ 底图设置</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="collapsible-content">
                        <div class="panel-body">
                            <div class="form-group">
                                <label>底图样式</label>
                                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                                    <button class="btn btn-sm" id="btnNormal" onclick="setBasemapFromPanel('normal')">标准</button>
                                    <button class="btn btn-sm" id="btnLight" onclick="setBasemapFromPanel('light')">浅色</button>
                                    <button class="btn btn-sm" id="btnGrey" onclick="setBasemapFromPanel('grey')">灰色</button>
                                    <button class="btn btn-sm" id="btnDark" onclick="setBasemapFromPanel('dark')">深色</button>
                                </div>
                            </div>
                            <div class="form-group" style="margin-top: 12px;">
                                <label>显示要素</label>
                                <div style="display: flex; flex-direction: column; gap: 8px;">
                                    <label class="map-feature-item" style="justify-content: flex-start;"><input type="checkbox" checked onchange="toggleMapFeature('bg', this)">区域面</label>
                                    <label class="map-feature-item" style="justify-content: flex-start;"><input type="checkbox" checked onchange="toggleMapFeature('road', this)">道路</label>
                                    <label class="map-feature-item" style="justify-content: flex-start;"><input type="checkbox" checked onchange="toggleMapFeature('building', this)">建筑</label>
                                    <label class="map-feature-item" style="justify-content: flex-start;"><input type="checkbox" checked onchange="toggleMapFeature('point', this)">标签</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="collapsible-panel" id="stylePanel" style="display: none;">
                    <div class="collapsible-header" onclick="toggleCollapse(this)">
                        <span>🎨 图标样式</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="collapsible-content">
                    <div class="panel-body" id="pointStylePanel" style="display: none;">
                        <div class="form-group">
                            <label>图标形状</label>
                            <div class="icon-selector">
                                <div class="icon-option active" onclick="selectIconShape('circle', this)" title="圆形">⭕</div>
                                <div class="icon-option" onclick="selectIconShape('pin', this)" title="图钉">📍</div>
                                <div class="icon-option" onclick="selectIconShape('square', this)" title="方形">⬜</div>
                                <div class="icon-option" onclick="selectIconShape('diamond', this)" title="菱形">🔷</div>
                                <div class="icon-option" onclick="selectIconShape('cross', this)" title="十字">✚</div>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>大小 (px)</label>
                                <input type="number" id="markerSize" value="12" min="4" max="50" onchange="updateStyle()">
                            </div>
                            <div class="form-group">
                                <label>填充颜色</label>
                                <input type="color" id="markerColor" value="#1677ff" onchange="updateStyle()">
                            </div>
                        </div>
                        <div class="form-row">

                    <div class="panel-body">

                        <div class="form-group" style="margin-top: 16px;">

                            <div class="form-group">
                                <label>描边颜色</label>

        <!-- 地图区域 -->
        <div class="map-container">
            <div id="map"></div>
            
            <div id="loading" class="loading">
                <div class="loading-spinner"></div>
                <div style="margin-top: 12px; color: #8c8c8c;">地图加载中...</div>

            <div class="toolbar">

    <!-- 下钻详情弹窗 -->
    <div class="modal-overlay" id="drillModal">
        <div class="modal drill-modal">

                <span>要素详情</span>
                <span style="cursor: pointer;" onclick="hideModal('drillModal')">✕</span>

    <!-- 数据编辑弹窗 -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <span>编辑数据</span>
                <span style="cursor: pointer;" onclick="hideModal('editModal')">✕</span>
            </div>
            <div class="modal-body" id="editForm"></div>
            <div class="modal-footer">
                <button class="btn" onclick="hideModal('editModal')">取消</button>
                <button class="btn btn-primary" onclick="saveEdit()">保存</button>
